<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>写経ノート - 毎日1ページの学習習慣</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="apple-touch-icon" href="https://img.icons8.com/color/192/000000/notebook.png">
  <style>
    .font-notebook { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; }
    .paper-texture { background: #fdfcf0; border: 1px solid #e5e7eb; }
  </style>
</head>
<body class="bg-stone-100 min-h-screen font-notebook text-stone-800">
  <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-xl">
    
    <!-- ヘッダー -->
    <header class="p-6 border-b border-stone-200">
      <h1 class="text-2xl font-bold text-stone-700">写経ノート</h1>
      <p class="text-sm text-stone-500">毎日1ページ、学びを書き写そう</p>
    </header>

    <!-- メイン -->
    <main class="flex-1 p-6 space-y-8">
      <!-- テーマ選択 -->
      <section>
        <label class="block text-sm font-bold mb-3">今日のテーマを選択</label>
        <select id="theme-select" class="w-full p-3 border border-stone-300 rounded-lg">
          <option>政治</option><option>経済</option><option>心理学</option><option>歴史</option>
          <option>科学</option><option>オカルト</option><option>雑学</option>
        </select>
        <button id="generate-btn" class="w-full mt-4 bg-stone-800 text-white py-3 rounded-lg font-bold">ノートを生成する</button>
      </section>

      <!-- 生成ノート表示エリア -->
      <section id="note-display" class="hidden paper-texture p-8 shadow-inner min-h-[400px]">
        <h2 id="note-title" class="text-xl font-bold border-b-2 border-stone-800 pb-2 mb-4"></h2>
        <div id="note-content" class="text-sm leading-loose space-y-4"></div>
      </section>

      <!-- 継続ログ -->
      <section class="border-t pt-6">
        <h3 class="font-bold mb-4">継続状況</h3>
        <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
      </section>
    </main>
  </div>

  <script>
    const themes = {
      "政治": "社会契約論の基本。主権者は誰か。国家の役割と個人の自由。",
      "経済": "需要と供給の法則。市場均衡と価格メカニズムの仕組み。",
      "心理学": "認知的不協和の解消。人間が信じたいものを信じる理由。",
      "歴史": "産業革命が変えた社会構造。都市化と労働環境の変化。",
      "科学": "エントロピー増大の法則。宇宙のエネルギーと秩序。",
      "オカルト": "都市伝説の社会学的考察。集団心理と不安の投影。",
      "雑学": "コーヒーの歴史。嗜好品が外交に与えた影響。"
    };

    const generateNote = () => {
      const theme = document.getElementById('theme-select').value;
      const content = themes[theme];
      document.getElementById('note-title').innerText = theme;
      document.getElementById('note-content').innerHTML = `
        <h4 class="font-bold text-stone-500">【要点】</h4>
        <ul class="list-disc pl-5">
          ${[1,2,3,4,5].map(i => `<li>${theme}の重要な概念 ${i}</li>`).join('')}
        </ul>
        <h4 class="font-bold text-stone-500 mt-4">【詳細補足】</h4>
        <p>${content}</p>
        <div class="h-24"></div>
        <h4 class="font-bold text-stone-500">【まとめ】</h4>
        <p>短文で本質を3行でまとめる余白...</p>
      `;
      document.getElementById('note-display').classList.remove('hidden');
      saveLog(theme);
    };

    const saveLog = (theme) => {
      const today = new Date().toISOString().split('T')[0];
      localStorage.setItem(`log_${today}`, theme);
      alert('今日の記録を保存しました！');
    };

    document.getElementById('generate-btn').addEventListener('click', generateNote);
  </script>
</body>
</html>
